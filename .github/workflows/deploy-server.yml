name: Deploy Server

on:
  push:
    branches: [main]
    paths: [server/**, api/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Build
        run: cd server && GOOS=linux GOARCH=amd64 go build -o availability-server ./cmd/server

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H REDACTED_VPS_IP >> ~/.ssh/known_hosts
          scp server/availability-server root@REDACTED_VPS_IP:/opt/availability/availability-server
          ssh root@REDACTED_VPS_IP 'systemctl restart availability'
